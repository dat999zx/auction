name: Bidify CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Prepare Version
        run: |
          TAG=${GITHUB_REF_NAME}
          VER=${TAG#v}
          echo "VERSION=$VER" >> $GITHUB_ENV
          mvn versions:set -DnewVersion=$VER -DgenerateBackupPoms=false

      - run: mvn -B clean package -Puniversal -DskipTests

      - name: Rename Artifacts
        run: |
          mv server/target/server-*-fat.jar server/target/server-${{ env.VERSION }}.jar
          mv client/target/client-*-universal.jar client/target/client-${{ env.VERSION }}.jar

      - uses: softprops/action-gh-release@v2
        with:
          name: Bidify ${{ github.ref_name }}
          files: |
            server/target/server-${{ env.VERSION }}.jar
            client/target/client-${{ env.VERSION }}.jar
