name: Bidify CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Prepare Version and Notes
        run: |
          TAG=${GITHUB_REF_NAME}
          VER=${TAG#v}
          echo "VERSION=$VER" >> $GITHUB_ENV
          mvn versions:set -DnewVersion=$VER -DgenerateBackupPoms=false
          sed -n "/# 🚀 Changelog - ${TAG}/,/---/p" changelog.md | sed '/---/d' > notes.txt
          PREV=$(git describe --tags --abbrev=0 ${TAG}^ 2>/dev/null || echo "")
          [ -n "$PREV" ] && echo -e "\n**Full Changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/${PREV}...${TAG}" >> notes.txt

      - run: mvn -B clean package -DskipTests

      - name: Rename Artifacts
        run: |
          mv server/target/server-${{ env.VERSION }}-fat.jar server/target/server-${{ env.VERSION }}.jar
          mv client/target/client-${{ env.VERSION }}-universal.jar client/target/client-${{ env.VERSION }}.jar

      - uses: softprops/action-gh-release@v2
        with:
          name: Bidify ${{ github.ref_name }}
          body_path: notes.txt
          files: |
            server/target/server-${{ env.VERSION }}.jar
            client/target/client-${{ env.VERSION }}.jar
          generate_release_notes: false
